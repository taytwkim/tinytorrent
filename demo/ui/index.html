<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero__controls">
          <div class="status-strip" id="status-strip"></div>
          <div class="hero__actions">
            <button class="button button--ghost" type="button">Reset Demo</button>
          </div>
        </div>
      </header>
        <div class="peer-grid" id="peer-grid"></div>
      </section>

      <section class="workspace">
        <article class="panel panel--files">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Catalog</p>
              <h3>Available Files</h3>
            </div>
            <button class="button button--ghost button--small" type="button">Poll files</button>
          </div>
          <div class="file-list" id="file-list"></div>
        </article>

        <article class="panel panel--transfer">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Transfer Activity</p>
              <h3>Active transfer</h3>
            </div>
            <span class="chip chip--live">Live simulation</span>
          </div>

          <div class="transfer-summary" id="transfer-summary"></div>
          <div class="piece-legend">
            <span><i class="piece-swatch piece-swatch--done"></i> Retrieved</span>
            <span><i class="piece-swatch piece-swatch--active"></i> In flight</span>
            <span><i class="piece-swatch piece-swatch--idle"></i> Pending</span>
          </div>
          <div class="piece-grid" id="piece-grid"></div>
        </article>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
